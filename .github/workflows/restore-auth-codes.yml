name: Restore Auth Codes

on:
  workflow_dispatch:
    inputs:
      restore_plan_file:
        description: "Restore plan file path, for example plans/restore-plan-latest.json"
        required: true
        default: "plans/restore-plan-latest.json"
        type: string
      mode:
        description: "Test only or create real restore authorization codes?"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - normal
      password:
        description: "Bot Manager action password"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: restore-auth-codes
  cancel-in-progress: false

jobs:
  restore-auth-codes:
    runs-on: ubuntu-latest

    steps:
      - name: Verify password
        env:
          INPUT_PASSWORD: ${{ inputs.password }}
          ACTION_PASSWORD: ${{ secrets.BOT_MANAGER_ACTION_PASSWORD }}
        run: |
          if [ "$INPUT_PASSWORD" != "$ACTION_PASSWORD" ]; then
            echo "Wrong password."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Send test log
        if: ${{ inputs.mode == 'test' }}
        run: |
          node - <<'NODE'
          const url = process.env.LOG_WEBHOOK_URL;

          if (!url) {
            console.log("No LOG_WEBHOOK_URL set. Skipping test log.");
            process.exit(0);
          }

          const berlinTime = new Intl.DateTimeFormat("en-GB", {
            timeZone: "Europe/Berlin",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          }).format(new Date());

          const payload = {
            username: "Bot Manager Log",
            content: `🧪 **Restore Auth Codes TEST completed**\n\nPassword check passed.\nNo Discord changes were made.\nNo codes were generated.\nNo DM was sent.\nNo authorization file was created.\nNo GitHub files were changed.\n\nSelected plan file: ${process.env.RESTORE_PLAN_FILE}\nTime: ${berlinTime} Europe/Berlin`,
            allowed_mentions: {
              parse: []
            }
          };

          const response = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(`Log Webhook Error: ${response.status} ${await response.text()}`);
          }

          console.log("Test log sent.");
          NODE
        env:
          LOG_WEBHOOK_URL: ${{ secrets.LOG_WEBHOOK_URL }}
          RESTORE_PLAN_FILE: ${{ inputs.restore_plan_file }}

      - name: Checkout repository
        if: ${{ inputs.mode == 'normal' }}
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest repository state
        if: ${{ inputs.mode == 'normal' }}
        run: |
          git pull --ff-only origin main

      - name: Create restore auth codes
        if: ${{ inputs.mode == 'normal' }}
        run: node restore-auth-codes.js
        env:
          MODE: ${{ inputs.mode }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RESTORE_DM_USER_ID: ${{ secrets.RESTORE_DM_USER_ID }}
          LOG_WEBHOOK_URL: ${{ secrets.LOG_WEBHOOK_URL }}
          RESTORE_PLAN_FILE: ${{ inputs.restore_plan_file }}
          AUTH_TTL_MINUTES: "10"

      - name: Commit restore authorization
        if: ${{ inputs.mode == 'normal' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add restore-auth/
          git diff --cached --quiet || git commit -m "Add restore authorization"
          git push origin main
